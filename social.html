<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Social Setting · BreakCards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #1E0828;
      --bg2:        #280A36;
      --accent:     #D93585;
      --accent-dim: rgba(217,53,133,0.12);
      --accent-mid: rgba(217,53,133,0.4);
      --text:       #FFE4F2;
      --dim:        rgba(255,228,242,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding-bottom: 60px;
    }

    /* ── Hero ─────────────────────────────────── */
    .hero { width: 100%; }
    .hero-svg { display: block; width: 100%; }

    .hero-text {
      padding: 16px 28px 28px;
      text-align: center;
    }
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* ── Divider ──────────────────────────────── */
    .divider {
      width: calc(100% - 56px);
      margin: 0 28px;
      height: 1px;
      background: rgba(217,53,133,0.18);
    }

    /* ── Sections ─────────────────────────────── */
    .section { padding: 32px 28px 0; }

    .section-label {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ── Reasons ─────────────────────────────── */
    .reason-list { display: flex; flex-direction: column; gap: 12px; }

    .reason-card {
      background: var(--accent-dim);
      border: 1px solid rgba(217,53,133,0.22);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .reason-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .reason-text {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      padding-top: 4px;
    }
    .reason-empty { font-size: 14px; color: var(--dim); font-style: italic; }

    /* ── Quote ───────────────────────────────── */
    .quote-wrap { padding: 28px; text-align: center; }
    .quote-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 64px;
      color: var(--accent);
      opacity: 0.3;
      line-height: 0.5;
      display: block;
      margin-bottom: 8px;
    }
    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--text);
      line-height: 1.55;
    }

    /* ── Limit card ──────────────────────────── */
    .limit-card {
      margin: 0 28px;
      background: var(--bg2);
      border: 1.5px solid rgba(217,53,133,0.3);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
    }
    .limit-label {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .limit-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }
    .limit-unit { font-size: 15px; color: var(--dim); margin-bottom: 16px; }
    .limit-bar-wrap {
      width: 100%; height: 4px;
      background: rgba(217,53,133,0.15);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 14px;
    }
    .limit-bar {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 1s ease;
    }
    .limit-context { font-size: 13px; color: var(--dim); line-height: 1.55; }
    .limit-context strong { color: var(--accent); font-weight: 500; }

    /* ── Commit section ──────────────────────── */
    .commit-section { padding: 28px 28px 0; }

    .btn-primary {
      width: 100%;
      padding: 18px 24px;
      background: var(--accent);
      color: #1E0828;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }
    .btn-primary:active { transform: scale(0.98); }

    .btn-share {
      width: 100%;
      padding: 17px 24px;
      background: transparent;
      border: 1.5px solid rgba(217,53,133,0.4);
      color: var(--text);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-share:active  { border-color: var(--accent); }
    .btn-share:disabled { opacity: 0.5; cursor: default; }

    /* ── Committed state ─────────────────────── */
    .committed-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px;
      background: rgba(217,53,133,0.1);
      border: 1.5px solid rgba(217,53,133,0.35);
      border-radius: 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .committed-box.visible { display: flex; }
    .committed-check {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: rgba(217,53,133,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .committed-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }
    .committed-sub { font-size: 14px; color: var(--dim); line-height: 1.55; }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,8,40,0.97);
      border: 1px solid rgba(217,53,133,0.4);
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      transition: transform 0.35s ease;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══════════════════════════ HERO ══════════════════════════ -->
<div class="hero">
  <svg class="hero-svg" viewBox="0 0 360 315" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="360" height="315" fill="#1E0828"/>

    <!-- ── Dots — row 1 (upper, smaller) ── -->
    <circle cx="28"  cy="72"  r="5"   fill="none" stroke="rgba(217,53,133,0.32)" stroke-width="1.2"/>
    <circle cx="70"  cy="61"  r="6"   fill="none" stroke="rgba(217,53,133,0.38)" stroke-width="1.2"/>
    <circle cx="116" cy="54"  r="7"   fill="none" stroke="rgba(217,53,133,0.44)" stroke-width="1.2"/>
    <circle cx="164" cy="51"  r="7.5" fill="none" stroke="rgba(217,53,133,0.48)" stroke-width="1.2"/>
    <circle cx="212" cy="54"  r="7"   fill="none" stroke="rgba(217,53,133,0.44)" stroke-width="1.2"/>
    <circle cx="258" cy="61"  r="6"   fill="none" stroke="rgba(217,53,133,0.38)" stroke-width="1.2"/>

    <!-- ── Dots — row 2 (lower, larger) ── -->
    <circle cx="12"  cy="112" r="7"   fill="none" stroke="rgba(217,53,133,0.38)" stroke-width="1.2"/>

    <circle cx="160" cy="85"  r="13"  fill="none" stroke="rgba(217,53,133,0.56)" stroke-width="1.3"/>

    <!-- ── Three overlapping Venn circles ── -->
    <circle cx="136" cy="218" r="90" fill="none" stroke="rgba(217,53,133,0.3)"  stroke-width="1.5"/>
    <circle cx="224" cy="218" r="90" fill="none" stroke="rgba(217,53,133,0.3)"  stroke-width="1.5"/>
    <circle cx="180" cy="184" r="90" fill="none" stroke="rgba(217,53,133,0.22)" stroke-width="1.5"/>

    <!-- ── Left chat bubble ── -->
    <!-- Tail behind rect -->
    <polygon points="127,222 116,240 150,222"
             fill="#280A36" stroke="rgba(217,53,133,0.6)" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Rect on top -->
    <rect x="104" y="186" width="76" height="37" rx="11"

    <rect x="112" y="219" width="55" height="5" fill="#280A36"/>

    <circle cx="122" cy="204.5" r="3.5" fill="rgba(217,53,133,0.5)"/>
    <circle cx="136" cy="204.5" r="3.5" fill="rgba(217,53,133,0.72)"/>
    <circle cx="150" cy="204.5" r="3.5" fill="#D93585"/>

    <!-- ── Right chat bubble (larger, overlapping) ── -->
    <!-- Tail behind rect -->
    <polygon points="196,212 184,230 212,212"
             fill="#280A36" stroke="rgba(217,53,133,0.78)" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Rect on top -->
    <rect x="172" y="173" width="84" height="40" rx="11"
          fill="#280A36" stroke="rgba(217,53,133,0.78)" stroke-width="1.2"/>
    <!-- Cover tail–rect seam -->
    <rect x="180" y="209" width="60" height="5" fill="#280A36"/>
    <!-- Dots + forward arrow -->
    <circle cx="190" cy="193" r="3.5" fill="rgba(217,53,133,0.45)"/>
    <circle cx="204" cy="193" r="3.5" fill="rgba(217,53,133,0.68)"/>
    <circle cx="218" cy="193" r="3.5" fill="#D93585"/>
    <path d="M228 193 l6-4 -6-4" stroke="#D93585" stroke-width="1.6"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div class="hero-text">
    <p class="eyebrow">navigating a</p>
    <h1 class="hero-title">social setting</h1>
    <p class="hero-sub">people · connection · space</p>
  </div>
</div>

<div class="divider"></div>

<!-- ══════════════════════════ REASONS ══════════════════════════ -->
<div class="section">
  <p class="section-label">Why you're doing this</p>
  <div class="reason-list" id="reasons-list"></div>
</div>

<!-- ══════════════════════════ QUOTE ══════════════════════════ -->
<div class="quote-wrap">
  <span class="quote-mark">"</span>
  <p class="quote-text" id="quote-text"></p>
</div>

<div class="divider"></div>

<!-- ══════════════════════════ LIMIT ══════════════════════════ -->
<div class="section" style="padding-bottom:20px">
  <p class="section-label">Tonight's commitment</p>
</div>

<div class="limit-card">
  <p class="limit-label">Recommended limit</p>
  <div class="limit-num" id="limit-num">—</div>
  <p class="limit-unit">cigarettes tonight</p>
  <div class="limit-bar-wrap">
    <div class="limit-bar" id="limit-bar" style="width:0%"></div>
  </div>
  <p class="limit-context" id="limit-context"></p>
</div>

<!-- ══════════════════════════ COMMIT ══════════════════════════ -->
<div class="commit-section">
  <div class="committed-box" id="committed-box">
    <div class="committed-check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M4 12l5 5 11-11" stroke="#D93585" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="committed-title">Committed.</p>
    <p class="committed-sub" id="committed-sub"></p>
  </div>

  <button class="btn-primary" id="btn-commit" onclick="commit()">
    I commit to this goal
  </button>

  <button class="btn-share" id="btn-share" onclick="shareToTelegram()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Tell your group
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────────────────────
//  Telegram config
// ────────────────────────────────────────────────────────────
const TG_TOKEN   = '8696784388:AAGgrzcQH7kMCW2c8gBtusfMC6gwJbues4o';
const TG_CHAT_ID = '@smokingcessationjason';

// ────────────────────────────────────────────────────────────
//  Storage helpers
// ────────────────────────────────────────────────────────────
function getProfile() {
  try { return JSON.parse(localStorage.getItem('bc_profile') || 'null'); } catch(e) { return null; }
}
function getLogs() {
  try { return JSON.parse(localStorage.getItem('bc_logs') || '[]'); } catch(e) { return []; }
}

// ────────────────────────────────────────────────────────────
//  Quotes
// ────────────────────────────────────────────────────────────
const QUOTES = [
  "You don't need a cigarette to belong in a room.",
  "The strongest person at the bar is the one who doesn't need one.",
  "Your health is worth more than any social moment.",
  "You can still have a great night — just on your own terms.",
  "Every time you say no out here, you say yes to yourself.",
  "The craving will pass. The pride of resisting won't.",
  "You've already decided who you want to be. Act like it.",
  "One night at a time. Tonight, you're in control.",
  "Your reasons are bigger than this moment.",
  "The best version of you doesn't need it."
];

// ────────────────────────────────────────────────────────────
//  Limit calculation
// ────────────────────────────────────────────────────────────
function calcLimit() {
  const profile  = getProfile();
  const logs     = getLogs();
  const baseline = profile?.sticksPerDay || 10;

  const last7dates = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - i - 1);
    return d.toISOString().slice(0, 10);
  });
  const logsLast7 = last7dates.map(d => logs.find(l => l.date === d)).filter(Boolean);

  let avg, source;
  if (logsLast7.length >= 2) {
    avg    = logsLast7.reduce((s, l) => s + (l.sticks || 0), 0) / logsLast7.length;
    source = `Based on your last ${logsLast7.length}-day avg of <strong>${avg.toFixed(1)}</strong>`;
  } else {
    const lastLog = logs[logs.length - 1];
    avg    = lastLog?.tomorrowTarget || baseline;
    source = `Based on your daily target of <strong>${avg}</strong>`;
  }

  const limit = Math.max(1, Math.ceil(avg * 0.4));
  const pct   = Math.min(100, Math.round((limit / baseline) * 100));
  return { limit, avg, source, pct };
}

// ────────────────────────────────────────────────────────────
//  State
// ────────────────────────────────────────────────────────────
let isCommitted = false;
let limit       = 0;

// ────────────────────────────────────────────────────────────
//  Commit
// ────────────────────────────────────────────────────────────
function commit() {
  if (isCommitted) return;
  isCommitted = true;

  document.getElementById('btn-commit').style.display = 'none';
  document.getElementById('committed-box').classList.add('visible');

  const profile = getProfile();
  const name    = profile?.name ? `, ${profile.name}` : '';
  document.getElementById('committed-sub').textContent =
    `Max ${limit} tonight${name}. You've got this.`;

  showToast('Commitment locked in ✓');
}

// ────────────────────────────────────────────────────────────
//  Share to Telegram (automatic send via Bot API)
// ────────────────────────────────────────────────────────────
async function shareToTelegram() {
  const btn     = document.getElementById('btn-share');
  const profile = getProfile();
  const name    = profile?.name || 'Someone';
  const message = buildShareMessage(profile, name);

  btn.disabled     = true;
  btn.innerHTML    = 'Sending…';

  try {
    const resp = await fetch(
      `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,
      {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          chat_id:    TG_CHAT_ID,
          text:       message,
          parse_mode: 'HTML'
        })
      }
    );
    const data = await resp.json();

    if (data.ok) {
      btn.innerHTML  = '✓ &nbsp;Sent to group';
      btn.style.borderColor = 'var(--accent)';
      btn.style.color       = 'var(--accent)';
      showToast('Posted to your group ✓');
    } else {
      btn.disabled  = false;
      btn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>Tell your group`;
      showToast('Could not send — ' + (data.description || 'unknown error'));
    }
  } catch(e) {
    btn.disabled  = false;
    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>Tell your group`;
    showToast('No connection — try again');
  }
}

// Escape HTML entities for Telegram HTML parse mode
function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function buildShareMessage(profile, name) {
  const reasons = (profile?.reasons || []).filter(Boolean);
  const reasonLines = reasons.length
    ? reasons.map(r => `  • ${esc(r)}`).join('\n')
    : '  • Living healthier';

  return [
    `🚭 <b>${esc(name)}'s commitment tonight</b>`,
    ``,
    `Heading out, but staying in control.`,
    `Tonight's limit: <b>${limit} cigarette${limit !== 1 ? 's' : ''}</b>`,
    ``,
    `Why I'm doing this:`,
    reasonLines,
    ``,
    `Holding myself accountable. 💪`
  ].join('\n');
}

// ────────────────────────────────────────────────────────────
//  Toast
// ────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ────────────────────────────────────────────────────────────
//  Init
// ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  const profile = getProfile();

  // Reasons
  const reasons = (profile?.reasons || []).filter(Boolean);
  const list    = document.getElementById('reasons-list');
  if (reasons.length) {
    reasons.forEach((r, i) => {
      list.innerHTML += `
        <div class="reason-card">
          <span class="reason-num">${i + 1}</span>
          <span class="reason-text">${r}</span>
        </div>`;
    });
  } else {
    list.innerHTML = `<p class="reason-empty">
      Complete onboarding at <a href="/home" style="color:var(--accent)">your home page</a>
      to see your reasons here.
    </p>`;
  }

  // Quote
  document.getElementById('quote-text').textContent =
    QUOTES[Math.floor(Math.random() * QUOTES.length)];

  // Limit
  const { limit: l, source, pct } = calcLimit();
  limit = l;
  document.getElementById('limit-num').textContent = limit;
  document.getElementById('limit-context').innerHTML =
    source + ` — that's <strong>${pct}%</strong> of your daily average, a realistic goal for tonight.`;

  setTimeout(() => {
    document.getElementById('limit-bar').style.width = pct + '%';
  }, 300);
});
</script>
</body>
</html>
